<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farol Pricing — Seazone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .prose h1,.prose h2,.prose h3{font-weight:700;margin:.75em 0 .25em}
    .prose h2{font-size:1.1em;color:#1e40af}
    .prose h3{font-size:1em;color:#374151}
    .prose p{margin:.4em 0}
    .prose ul{list-style:disc;padding-left:1.25em;margin:.4em 0}
    .prose ol{list-style:decimal;padding-left:1.25em;margin:.4em 0}
    .prose strong{font-weight:600}
    .prose code{background:#f3f4f6;padding:.1em .3em;border-radius:3px;font-size:.9em}
    .prose table{width:100%;border-collapse:collapse;margin:.5em 0;font-size:.85em}
    .prose th{background:#f9fafb;padding:.4em .6em;text-align:left;border:1px solid #e5e7eb;font-weight:600}
    .prose td{padding:.4em .6em;border:1px solid #e5e7eb}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_URL = "http://localhost:8000";

const fmt = (v) => v != null ? Number(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" }) : "—";
const fmtPct = (v) => v != null ? `${Number(v).toFixed(1)}%` : "—";

// ─── CotaForm ─────────────────────────────────────────────────────────────────
const DEMO = {
  empreendimento_id: 1,
  empreendimento: "Seazone Resort Floripa",
  codigo: "209",
  area: 58.84,
  andar: "2",
  tipologia: "garden",
  valor_pago: 100000,
  saldo_devedor: 100000,
  participacao_pct: 100,
  vista_mar: true,
  garden: true,
  sacada: false,
  posicao_solar: "nascente",
  capacidade: 4,
  data_assinatura: "2022-03-15",
  imposto_pct: 0.15,
};

function CotaForm({ onStart }) {
  const [form, setForm] = useState(DEMO);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = (e) => {
    e.preventDefault();
    onStart({
      ...form,
      area: parseFloat(form.area) || 0,
      valor_pago: parseFloat(form.valor_pago) || 0,
      saldo_devedor: parseFloat(form.saldo_devedor) || 0,
      participacao_pct: parseFloat(form.participacao_pct) || 100,
      imposto_pct: parseFloat(form.imposto_pct) || 0,
    });
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-950 to-blue-800 flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
        <div className="bg-gradient-to-r from-blue-700 to-blue-600 px-8 py-6 text-white">
          <div className="flex items-center gap-3">
            <span className="text-3xl">🏖️</span>
            <div>
              <h1 className="text-xl font-bold">Farol Pricing</h1>
              <p className="text-blue-200 text-sm">Agente de precificação de cotas imobiliárias</p>
            </div>
          </div>
        </div>

        <form onSubmit={submit} className="p-8">
          <p className="text-sm text-gray-500 mb-6">Preencha os dados da cota para iniciar a análise de precificação.</p>

          <div className="grid grid-cols-2 gap-4 mb-4">
            <div className="col-span-2">
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Empreendimento</label>
              <input type="text" value={form.empreendimento} onChange={e => set("empreendimento", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Código da Unidade</label>
              <input type="text" value={form.codigo} onChange={e => set("codigo", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Área (m²)</label>
              <input type="number" step="0.01" value={form.area} onChange={e => set("area", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Valor Pago (R$)</label>
              <input type="number" step="1000" value={form.valor_pago} onChange={e => set("valor_pago", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Saldo Devedor (R$)</label>
              <input type="number" step="1000" value={form.saldo_devedor} onChange={e => set("saldo_devedor", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" required />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Tipologia</label>
              <select value={form.tipologia} onChange={e => set("tipologia", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="padrao">Padrão</option>
                <option value="garden">Garden</option>
                <option value="mezanino">Mezanino</option>
                <option value="cobertura">Cobertura</option>
              </select>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Posição Solar</label>
              <select value={form.posicao_solar || ""} onChange={e => set("posicao_solar", e.target.value || null)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">— nenhuma —</option>
                <option value="nascente">Nascente</option>
                <option value="poente">Poente</option>
                <option value="norte">Norte</option>
                <option value="sul">Sul</option>
              </select>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Alíquota IR (%)</label>
              <input type="number" step="0.01" min="0" max="100" value={(form.imposto_pct * 100).toFixed(0)}
                onChange={e => set("imposto_pct", parseFloat(e.target.value) / 100 || 0)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
          </div>

          <div className="flex gap-6 mb-6">
            <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" checked={form.vista_mar} onChange={e => set("vista_mar", e.target.checked)}
                className="w-4 h-4 rounded accent-blue-600" />
              🌊 Vista Mar
            </label>
            <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" checked={form.garden} onChange={e => set("garden", e.target.checked)}
                className="w-4 h-4 rounded accent-blue-600" />
              🌿 Garden
            </label>
            <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input type="checkbox" checked={form.sacada} onChange={e => set("sacada", e.target.checked)}
                className="w-4 h-4 rounded accent-blue-600" />
              🏗️ Sacada
            </label>
          </div>

          <button type="submit"
            className="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition text-sm">
            Iniciar análise de precificação →
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── ScenariosCard ─────────────────────────────────────────────────────────────
function ScenariosCard({ calculos }) {
  if (!calculos) return null;
  const cols = [
    { key: "cenario_conservador", label: "Conservador", bg: "bg-blue-50", border: "border-blue-200", text: "text-blue-700" },
    { key: "cenario_justo", label: "Justo ⭐", bg: "bg-emerald-50", border: "border-emerald-400 ring-2 ring-emerald-300", text: "text-emerald-700" },
    { key: "cenario_otimista", label: "Otimista", bg: "bg-purple-50", border: "border-purple-200", text: "text-purple-700" },
  ];
  return (
    <div className="mt-4">
      <p className="text-xs text-gray-500 mb-2">
        Break-even: <strong className="text-gray-700">{fmt(calculos.preco_minimo)}</strong>
        <span className="mx-2">·</span>
        Aquisição total: <strong className="text-gray-700">{fmt(calculos.valor_aquisicao)}</strong>
      </p>
      <div className="grid grid-cols-3 gap-3">
        {cols.map(({ key, label, bg, border, text }) => {
          const c = calculos[key];
          if (!c) return null;
          return (
            <div key={key} className={`border rounded-xl p-4 ${bg} ${border}`}>
              <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${text}`}>{label}</p>
              <p className="text-xl font-bold text-gray-900">{fmt(c.preco)}</p>
              <div className="mt-2 space-y-1 text-sm text-gray-700">
                <div className="flex justify-between">
                  <span>ROI</span>
                  <span className={`font-bold ${c.roi_pct >= 0 ? "text-emerald-600" : "text-red-500"}`}>{fmtPct(c.roi_pct)}</span>
                </div>
                <div className="flex justify-between">
                  <span>Líquido</span><span className="font-medium">{fmt(c.valor_liquido)}</span>
                </div>
                <div className="flex justify-between">
                  <span>Ágio</span><span className="font-medium">{fmt(c.agio)}</span>
                </div>
                <div className="flex justify-between text-xs text-gray-400">
                  <span>Comissão SZN</span><span>{fmt(c.comissao_szn)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ToolCallsTrace ────────────────────────────────────────────────────────────
const TOOL_INFO = {
  get_economic_indicators: { icon: "📊", label: "Indicadores BCB" },
  get_cub_history:         { icon: "🏗️", label: "CUB histórico" },
  get_comparable_units:    { icon: "🏘️", label: "Comparáveis" },
  calculate_scenarios:     { icon: "🧮", label: "Cenários" },
};

function ToolCallsTrace({ tools }) {
  if (!tools?.length) return null;
  return (
    <div className="flex flex-wrap gap-1.5 mb-3">
      {tools.map((t, i) => {
        const info = TOOL_INFO[t] || { icon: "⚙️", label: t };
        return (
          <span key={i} className="inline-flex items-center gap-1 bg-gray-100 text-gray-500 text-xs px-2.5 py-1 rounded-full border border-gray-200">
            {info.icon} {info.label} <span className="text-green-500 font-bold">✓</span>
          </span>
        );
      })}
    </div>
  );
}

// ─── ComparablesTable ────────────────────────────────────────────────────────
function ComparablesTable({ comparaveis }) {
  if (!comparaveis?.length) return null;
  return (
    <div className="mt-4 border-t pt-3">
      <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Unidades comparáveis</p>
      <table className="w-full text-xs text-gray-600">
        <thead>
          <tr className="border-b border-gray-100 text-gray-400">
            <th className="text-left pb-1 pr-3">Unidade</th>
            <th className="text-left pb-1 pr-3">Área</th>
            <th className="text-left pb-1 pr-3">Tipologia</th>
            <th className="text-right pb-1 pr-3">Net Revenue</th>
            <th className="text-left pb-1">Status</th>
          </tr>
        </thead>
        <tbody>
          {comparaveis.slice(0, 6).map((c, i) => (
            <tr key={i} className="border-b border-gray-50">
              <td className="py-1 pr-3 font-semibold">{c.codigo ?? "—"}</td>
              <td className="py-1 pr-3">{c.area != null ? `${c.area}m²` : "—"}</td>
              <td className="py-1 pr-3">{c.tipologia ?? "—"}</td>
              <td className="py-1 pr-3 text-right">{c.net_revenue != null ? fmt(c.net_revenue) : "—"}</td>
              <td className="py-1">{c.status ?? "—"}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── PricingChat ───────────────────────────────────────────────────────────────
function PricingChat({ cota, onBack }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  const send = async (text) => {
    if (!text.trim() || loading) return;
    const newMsgs = [...messages, { role: "user", content: text }];
    setMessages(newMsgs);
    setInput("");
    setLoading(true);

    try {
      const resp = await fetch(`${API_URL}/api/price-agent`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          cota,
          messages: newMsgs.map(m => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await resp.json();
      setMessages(prev => [...prev, { role: "assistant", content: data.message || "Sem resposta.", meta: data }]);
    } catch {
      setMessages(prev => [...prev, { role: "assistant", content: "⚠️ Erro ao conectar com a API." }]);
    } finally {
      setLoading(false);
    }
  };

  const suggestions = [
    "Qual o melhor preço para vender agora?",
    "Mostre a análise completa",
    "Compare com o rendimento da Selic",
  ];

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col">
      {/* Header */}
      <div className="bg-white border-b shadow-sm px-6 py-4 flex items-center gap-4">
        <button onClick={onBack} className="text-gray-400 hover:text-gray-700 text-xl leading-none">←</button>
        <div className="flex-1 min-w-0">
          <p className="font-semibold text-gray-800 truncate">{cota.empreendimento} — Unid. {cota.codigo}</p>
          <p className="text-xs text-gray-400">
            {cota.area}m² · {cota.tipologia}
            {cota.vista_mar && " · 🌊 Vista Mar"}
            {cota.garden && " · 🌿 Garden"}
            · Pago: {fmt(cota.valor_pago)} · Saldo: {fmt(cota.saldo_devedor)}
          </p>
        </div>
        <span className="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full shrink-0">
          🤖 Farol Pricing
        </span>
      </div>

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-4 py-6">
        <div className="max-w-3xl mx-auto space-y-5">
          {messages.length === 0 && (
            <div className="text-center py-16">
              <div className="text-5xl mb-4">🏖️</div>
              <p className="text-lg font-semibold text-gray-700">Olá! Sou o Farol Pricing.</p>
              <p className="text-sm text-gray-400 mt-2 max-w-sm mx-auto">
                Analiso indicadores econômicos, comparo unidades e calculo cenários de preço em tempo real.
              </p>
              <div className="mt-6 flex flex-wrap gap-2 justify-center">
                {suggestions.map(s => (
                  <button key={s} onClick={() => send(s)}
                    className="bg-white border border-gray-200 text-gray-600 text-sm px-4 py-2 rounded-full hover:border-blue-400 hover:text-blue-700 transition shadow-sm">
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}

          {messages.map((m, i) => (
            <div key={i} className={m.role === "user" ? "flex justify-end" : ""}>
              {m.role === "user" ? (
                <div className="bg-blue-700 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-md text-sm shadow-sm">
                  {m.content}
                </div>
              ) : (
                <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm p-5 shadow-sm">
                  <ToolCallsTrace tools={m.meta?.tool_calls_made} />
                  <div className="prose text-gray-800 text-sm"
                    dangerouslySetInnerHTML={{ __html: marked.parse(m.content || "") }} />
                  <ScenariosCard calculos={m.meta?.calculos} />
                  <ComparablesTable comparaveis={m.meta?.comparaveis} />
                  {m.meta?.indicadores && (
                    <div className="mt-3 flex flex-wrap gap-4 text-xs text-gray-400 border-t pt-3">
                      <span>📊 Selic: <strong className="text-gray-600">{m.meta.indicadores.selic_aa}% a.a.</strong></span>
                      {m.meta.indicadores.ipca_12m != null && (
                        <span>📈 IPCA 12m: <strong className="text-gray-600">{fmtPct(m.meta.indicadores.ipca_12m)}</strong></span>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}

          {loading && (
            <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm p-5 shadow-sm">
              <div className="flex items-center gap-3 text-gray-400 text-sm">
                <svg className="animate-spin h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                </svg>
                Consultando BCB, Metabase e calculando cenários...
              </div>
            </div>
          )}

          <div ref={endRef} />
        </div>
      </div>

      {/* Input */}
      <div className="bg-white border-t px-4 py-4 shadow-sm">
        <div className="max-w-3xl mx-auto flex gap-3">
          <input type="text" value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && !e.shiftKey && send(input)}
            placeholder="Pergunte sobre o preço da sua cota..."
            disabled={loading}
            className="flex-1 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 bg-gray-50" />
          <button onClick={() => send(input)} disabled={loading || !input.trim()}
            className="bg-blue-700 hover:bg-blue-800 text-white px-5 py-3 rounded-xl font-semibold text-sm transition disabled:opacity-40">
            Enviar
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────────────────
function App() {
  const [cota, setCota] = useState(null);
  return cota
    ? <PricingChat cota={cota} onBack={() => setCota(null)} />
    : <CotaForm onStart={setCota} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
