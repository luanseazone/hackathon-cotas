<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farol Pricing — Seazone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .prose h2{font-weight:700;font-size:1.05em;color:#1e40af;margin:.8em 0 .3em}
    .prose h3{font-weight:600;font-size:1em;color:#374151;margin:.6em 0 .2em}
    .prose p{margin:.35em 0}
    .prose ul,.prose ol{padding-left:1.3em;margin:.35em 0}
    .prose ul{list-style:disc} .prose ol{list-style:decimal}
    .prose strong{font-weight:600}
    .prose code{background:#f3f4f6;padding:.1em .3em;border-radius:3px;font-size:.88em}
    .prose table{width:100%;border-collapse:collapse;margin:.5em 0;font-size:.85em}
    .prose th{background:#f9fafb;padding:.35em .6em;text-align:left;border:1px solid #e5e7eb;font-weight:600}
    .prose td{padding:.35em .6em;border:1px solid #e5e7eb}
    .prose hr{border:none;border-top:1px solid #e5e7eb;margin:.6em 0}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { createClient } = supabase;

const API_URL = "";
let sb = null;

const fmt  = (v) => v != null ? Number(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" }) : "—";
const fmtN = (v) => v != null ? Number(v).toLocaleString("pt-BR") : "—";
const fmtPct = (v) => v != null ? `${Number(v).toFixed(1)}%` : "—";

const fmtCpf = (v) => {
  const d = v.replace(/\D/g, "").slice(0, 11);
  if (d.length > 9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
  if (d.length > 6) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
  if (d.length > 3) return `${d.slice(0,3)}.${d.slice(3)}`;
  return d;
};

// ─── Login ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [cpf, setCpf] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    const digits = cpf.replace(/\D/g, "");
    try {
      const { data, error: err } = await sb.auth.signInWithPassword({
        email: `${digits}@seazone.internal`,
        password: digits.slice(0, 8),
      });
      if (err) throw err;
      onLogin(data.session);
    } catch {
      setError("CPF não encontrado ou credenciais inválidas.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-950 to-blue-800 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div className="bg-gradient-to-r from-blue-700 to-blue-600 px-8 py-7 text-center">
          <div className="text-4xl mb-2">🏖️</div>
          <h1 className="text-xl font-bold text-white">Farol Pricing</h1>
          <p className="text-blue-200 text-xs mt-1">Seazone — Marketplace de Cotas</p>
        </div>
        <form onSubmit={submit} className="p-8 space-y-4">
          <div>
            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">CPF</label>
            <input type="text" value={cpf} onChange={e => setCpf(fmtCpf(e.target.value))}
              placeholder="000.000.000-00" required
              className="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          {error && <p className="text-red-500 text-xs">{error}</p>}
          <button type="submit" disabled={loading}
            className="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition text-sm disabled:opacity-50">
            {loading ? "Entrando..." : "Entrar"}
          </button>
          <p className="text-center text-gray-400 text-xs">Senha: primeiros 8 dígitos do CPF</p>
        </form>
      </div>
    </div>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────────────────────
function cotaToPayload(contrato) {
  const u   = contrato.unidades || {};
  const emp = Array.isArray(u.empreendimentos) ? u.empreendimentos[0] : (u.empreendimentos || {});
  const d   = Array.isArray(u.descricao_unidades) ? (u.descricao_unidades[0] || {}) : (u.descricao_unidades || {});
  const rf  = Array.isArray(u.resumo_financeiro)  ? (u.resumo_financeiro[0]  || {}) : (u.resumo_financeiro  || {});
  return {
    empreendimento_id: emp.id,
    empreendimento:    emp.nome  || "—",
    codigo:            u.codigo  || "—",
    area:              parseFloat(u.area) || 0,
    andar:             u.andar?.toString(),
    tipologia:         u.tipologia || "padrao",
    valor_pago:        parseFloat(rf.valor_pago)    || 0,
    saldo_devedor:     parseFloat(rf.valor_pendente) || 0,
    participacao_pct:  parseFloat(contrato.participacao) || 100,
    vista_mar:         !!d.vista_mar,
    garden:            !!d.garden,
    sacada:            !!d.sacada_terraco,
    posicao_solar:     d.posicao_solar || null,
    capacidade:        d.capacidade   || null,
    data_assinatura:   contrato.data_assinatura || "2020-01-01",
    imposto_pct:       0.15,
  };
}

function CotaCard({ contrato, onClick }) {
  const u   = contrato.unidades || {};
  const emp = Array.isArray(u.empreendimentos) ? u.empreendimentos[0] : (u.empreendimentos || {});
  const d   = Array.isArray(u.descricao_unidades) ? (u.descricao_unidades[0] || {}) : (u.descricao_unidades || {});
  const rf  = Array.isArray(u.resumo_financeiro)  ? (u.resumo_financeiro[0]  || {}) : (u.resumo_financeiro  || {});

  const tags = [
    d.vista_mar      && "🌊 Vista Mar",
    d.garden         && "🌿 Garden",
    d.sacada_terraco && "🏗️ Sacada",
    d.posicao_solar  && `☀️ ${d.posicao_solar}`,
    d.capacidade     && `👥 ${d.capacidade} hósp.`,
  ].filter(Boolean);

  const valorTotal = (parseFloat(rf.valor_pago) || 0) + (parseFloat(rf.valor_pendente) || 0);

  return (
    <button onClick={onClick}
      className="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:border-blue-300 transition-all text-left w-full group">
      {/* Header card */}
      <div className="bg-gradient-to-r from-blue-600 to-blue-500 rounded-t-2xl px-5 py-4 flex justify-between items-start">
        <div>
          <p className="font-bold text-white text-sm leading-tight">{emp.nome || "—"}</p>
          <p className="text-blue-200 text-xs mt-0.5">{emp.cidade}{emp.estado ? `, ${emp.estado}` : ""}</p>
        </div>
        <span className="bg-white/20 text-white text-xs font-bold px-2.5 py-1 rounded-full shrink-0">
          Unid. {u.codigo}
        </span>
      </div>

      {/* Body */}
      <div className="px-5 py-4">
        <div className="flex gap-3 text-sm text-gray-600 mb-3">
          <span className="flex items-center gap-1">📐 <strong>{u.area}m²</strong></span>
          {u.andar && <span className="flex items-center gap-1">🏢 {u.andar}º andar</span>}
          <span className="flex items-center gap-1 capitalize">🏷️ {u.tipologia || "padrão"}</span>
          {contrato.participacao < 100 && (
            <span className="flex items-center gap-1">👤 {contrato.participacao}%</span>
          )}
        </div>

        {tags.length > 0 && (
          <div className="flex flex-wrap gap-1 mb-3">
            {tags.map(t => (
              <span key={t} className="bg-emerald-50 text-emerald-700 text-xs px-2 py-0.5 rounded-full border border-emerald-100">{t}</span>
            ))}
          </div>
        )}

        <div className="grid grid-cols-3 gap-2 pt-3 border-t border-gray-100 text-xs">
          <div>
            <p className="text-gray-400 mb-0.5">Valor pago</p>
            <p className="font-semibold text-gray-700">{fmt(rf.valor_pago)}</p>
          </div>
          <div>
            <p className="text-gray-400 mb-0.5">Saldo devedor</p>
            <p className="font-semibold text-gray-700">{fmt(rf.valor_pendente)}</p>
          </div>
          <div>
            <p className="text-gray-400 mb-0.5">Total aquisição</p>
            <p className="font-semibold text-gray-700">{fmt(valorTotal)}</p>
          </div>
        </div>
      </div>

      <div className="px-5 pb-4">
        <div className="bg-blue-50 group-hover:bg-blue-100 text-blue-700 text-xs font-semibold text-center py-2 rounded-lg transition">
          Precificar esta cota →
        </div>
      </div>
    </button>
  );
}

// ─── ManualCotaForm ────────────────────────────────────────────────────────────
function ManualCotaForm({ onSubmit, onCancel }) {
  const [form, setForm] = useState({
    empreendimento: "", codigo: "", area: "", andar: "",
    tipologia: "padrao", valor_pago: "", saldo_devedor: "",
    participacao_pct: "100", vista_mar: false, garden: false, sacada: false,
    posicao_solar: "", capacidade: "", data_assinatura: "2020-01-01",
  });
  const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

  const submit = (e) => {
    e.preventDefault();
    onSubmit({
      empreendimento_id: null,
      empreendimento:    form.empreendimento,
      codigo:            form.codigo || "—",
      area:              parseFloat(form.area) || 0,
      andar:             form.andar || null,
      tipologia:         form.tipologia,
      valor_pago:        parseFloat(form.valor_pago) || 0,
      saldo_devedor:     parseFloat(form.saldo_devedor) || 0,
      participacao_pct:  parseFloat(form.participacao_pct) || 100,
      vista_mar:         form.vista_mar,
      garden:            form.garden,
      sacada:            form.sacada,
      posicao_solar:     form.posicao_solar || null,
      capacidade:        form.capacidade ? parseInt(form.capacidade) : null,
      data_assinatura:   form.data_assinatura,
      imposto_pct:       0.15,
    });
  };

  const inp = "w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white";
  const lbl = "block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1";

  return (
    <form onSubmit={submit} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 max-w-2xl mx-auto">
      <h3 className="font-bold text-gray-800 mb-5 text-base">Dados da cota</h3>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div className="sm:col-span-2">
          <label className={lbl}>Empreendimento *</label>
          <input required className={inp} placeholder="Ex: Seazone Ocean View" value={form.empreendimento} onChange={e => set("empreendimento", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Código da unidade</label>
          <input className={inp} placeholder="Ex: 204-A" value={form.codigo} onChange={e => set("codigo", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Andar</label>
          <input className={inp} placeholder="Ex: 2" value={form.andar} onChange={e => set("andar", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Área (m²) *</label>
          <input required type="number" min="1" step="0.1" className={inp} placeholder="Ex: 42" value={form.area} onChange={e => set("area", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Tipologia</label>
          <select className={inp} value={form.tipologia} onChange={e => set("tipologia", e.target.value)}>
            <option value="padrao">Padrão</option>
            <option value="premium">Premium</option>
            <option value="garden_suite">Garden Suite</option>
            <option value="cobertura">Cobertura</option>
            <option value="studio">Studio</option>
          </select>
        </div>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
        <div>
          <label className={lbl}>Valor já pago (R$) *</label>
          <input required type="number" min="0" step="0.01" className={inp} placeholder="Ex: 350000" value={form.valor_pago} onChange={e => set("valor_pago", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Saldo devedor (R$)</label>
          <input type="number" min="0" step="0.01" className={inp} placeholder="Ex: 50000" value={form.saldo_devedor} onChange={e => set("saldo_devedor", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Participação (%)</label>
          <input type="number" min="1" max="100" step="0.01" className={inp} placeholder="100" value={form.participacao_pct} onChange={e => set("participacao_pct", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Data de assinatura</label>
          <input type="date" className={inp} value={form.data_assinatura} onChange={e => set("data_assinatura", e.target.value)} />
        </div>
        <div>
          <label className={lbl}>Posição solar</label>
          <select className={inp} value={form.posicao_solar} onChange={e => set("posicao_solar", e.target.value)}>
            <option value="">—</option>
            <option value="Norte">Norte</option>
            <option value="Sul">Sul</option>
            <option value="Leste">Leste</option>
            <option value="Oeste">Oeste</option>
            <option value="Nordeste">Nordeste</option>
            <option value="Noroeste">Noroeste</option>
          </select>
        </div>
        <div>
          <label className={lbl}>Capacidade (hóspedes)</label>
          <input type="number" min="1" className={inp} placeholder="Ex: 6" value={form.capacidade} onChange={e => set("capacidade", e.target.value)} />
        </div>
      </div>

      <div className="flex gap-6 mb-5">
        {[
          { key: "vista_mar", label: "🌊 Vista Mar" },
          { key: "garden",    label: "🌿 Garden" },
          { key: "sacada",    label: "🏗️ Sacada" },
        ].map(({ key, label }) => (
          <label key={key} className="flex items-center gap-2 cursor-pointer text-sm text-gray-700">
            <input type="checkbox" className="w-4 h-4 accent-blue-600" checked={form[key]} onChange={e => set(key, e.target.checked)} />
            {label}
          </label>
        ))}
      </div>

      <div className="flex gap-3 pt-2">
        {onCancel && (
          <button type="button" onClick={onCancel}
            className="flex-1 border border-gray-200 text-gray-600 font-semibold py-2.5 rounded-xl text-sm hover:bg-gray-50 transition">
            Cancelar
          </button>
        )}
        <button type="submit"
          className="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-xl text-sm transition">
          Precificar →
        </button>
      </div>
    </form>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ onSelect }) {
  const [contratos, setContratos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);

  useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    const { data } = await sb
      .from("contratos")
      .select(`
        id, participacao, data_assinatura, status,
        unidades (
          id, codigo, area, andar, tipologia,
          empreendimentos ( id, nome, cidade, estado ),
          descricao_unidades ( vista_mar, garden, sacada_terraco, posicao_solar, capacidade ),
          resumo_financeiro ( valor_pago, valor_pendente )
        )
      `)
      .eq("status", "ativo");
    setContratos(data || []);
    setLoading(false);
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="bg-white border-b shadow-sm">
        <div className="max-w-3xl mx-auto px-6 py-4 flex items-center gap-3">
          <span className="text-2xl">🏖️</span>
          <div>
            <h1 className="font-bold text-gray-800">Farol Pricing</h1>
            <p className="text-xs text-gray-400">Seazone — Precificação de Cotas</p>
          </div>
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-6 py-8">
        {showForm ? (
          <ManualCotaForm onSubmit={onSelect} onCancel={() => setShowForm(false)} />
        ) : (
          <>
            {/* CTA principal */}
            <div className="bg-gradient-to-br from-blue-700 to-blue-600 rounded-2xl p-7 text-white mb-6 shadow-lg">
              <p className="text-lg font-bold mb-1">Qual o preço ideal da sua cota?</p>
              <p className="text-blue-200 text-sm mb-5">Preencha os dados e o agente analisa Selic, IPCA, comparáveis e calcula 3 cenários de preço.</p>
              <button onClick={() => setShowForm(true)}
                className="bg-white text-blue-700 font-bold px-6 py-2.5 rounded-xl text-sm hover:bg-blue-50 transition shadow">
                Inserir minha cota →
              </button>
            </div>

            {/* Cotas do Supabase (se houver) */}
            {!loading && contratos.length > 0 && (
              <>
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Ou selecione uma cota vinculada</p>
                <div className="grid gap-4 sm:grid-cols-2">
                  {contratos.map(c => (
                    <CotaCard key={c.id} contrato={c} onClick={() => onSelect(cotaToPayload(c))} />
                  ))}
                </div>
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ─── ScenariosCard ─────────────────────────────────────────────────────────────
function ScenariosCard({ calculos }) {
  if (!calculos) return null;
  const cols = [
    { key: "cenario_conservador", label: "Conservador", bg: "bg-blue-50",   border: "border-blue-200",             text: "text-blue-700"   },
    { key: "cenario_justo",       label: "Justo ⭐",    bg: "bg-emerald-50", border: "border-emerald-400 ring-2 ring-emerald-300", text: "text-emerald-700" },
    { key: "cenario_otimista",    label: "Otimista",    bg: "bg-purple-50",  border: "border-purple-200",           text: "text-purple-700" },
  ];
  return (
    <div className="mt-4">
      <p className="text-xs text-gray-500 mb-2">
        Break-even: <strong className="text-gray-700">{fmt(calculos.preco_minimo)}</strong>
        <span className="mx-1.5">·</span>
        Aquisição total: <strong className="text-gray-700">{fmt(calculos.valor_aquisicao)}</strong>
      </p>
      <div className="grid grid-cols-3 gap-3">
        {cols.map(({ key, label, bg, border, text }) => {
          const c = calculos[key];
          if (!c) return null;
          return (
            <div key={key} className={`border rounded-xl p-4 ${bg} ${border}`}>
              <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${text}`}>{label}</p>
              <p className="text-xl font-bold text-gray-900">{fmt(c.preco)}</p>
              <div className="mt-2 space-y-1 text-sm text-gray-700">
                <div className="flex justify-between">
                  <span>ROI</span>
                  <span className={`font-bold ${c.roi_pct >= 0 ? "text-emerald-600" : "text-red-500"}`}>{fmtPct(c.roi_pct)}</span>
                </div>
                <div className="flex justify-between">
                  <span>Líquido</span><span className="font-medium">{fmt(c.valor_liquido)}</span>
                </div>
                <div className="flex justify-between">
                  <span>Ágio</span><span className="font-medium">{fmt(c.agio)}</span>
                </div>
                <div className="flex justify-between text-xs text-gray-400">
                  <span>Comissão SZN</span><span>{fmt(c.comissao_szn)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ToolCallsTrace ────────────────────────────────────────────────────────────
const TOOL_INFO = {
  get_economic_indicators: { icon: "📊", label: "Indicadores BCB"  },
  get_cub_history:         { icon: "🏗️", label: "CUB histórico"   },
  get_comparable_units:    { icon: "🏘️", label: "Comparáveis"     },
  calculate_scenarios:     { icon: "🧮", label: "Cenários"         },
};

function ToolCallsTrace({ tools }) {
  if (!tools?.length) return null;
  return (
    <div className="flex flex-wrap gap-1.5 mb-3">
      {tools.map((t, i) => {
        const info = TOOL_INFO[t] || { icon: "⚙️", label: t };
        return (
          <span key={i} className="inline-flex items-center gap-1 bg-gray-100 text-gray-500 text-xs px-2.5 py-1 rounded-full border border-gray-200">
            {info.icon} {info.label} <span className="text-green-500 font-bold">✓</span>
          </span>
        );
      })}
    </div>
  );
}

// ─── ComparablesTable ────────────────────────────────────────────────────────
function ComparablesTable({ comparaveis }) {
  if (!comparaveis?.length) return null;
  return (
    <div className="mt-4 border-t pt-3">
      <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Unidades comparáveis</p>
      <table className="w-full text-xs text-gray-600">
        <thead>
          <tr className="border-b border-gray-100 text-gray-400">
            <th className="text-left pb-1 pr-3">Unidade</th>
            <th className="text-left pb-1 pr-3">Área</th>
            <th className="text-left pb-1 pr-3">Tipologia</th>
            <th className="text-right pb-1 pr-3">Net Revenue</th>
            <th className="text-left pb-1">Status</th>
          </tr>
        </thead>
        <tbody>
          {comparaveis.slice(0, 6).map((c, i) => (
            <tr key={i} className="border-b border-gray-50">
              <td className="py-1 pr-3 font-semibold">{c.codigo ?? "—"}</td>
              <td className="py-1 pr-3">{c.area != null ? `${c.area}m²` : "—"}</td>
              <td className="py-1 pr-3">{c.tipologia ?? "—"}</td>
              <td className="py-1 pr-3 text-right">{c.net_revenue != null ? fmt(c.net_revenue) : "—"}</td>
              <td className="py-1">{c.status ?? "—"}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── PricingChat ───────────────────────────────────────────────────────────────
function PricingChat({ cota, onBack }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  const send = async (text) => {
    if (!text.trim() || loading) return;
    const newMsgs = [...messages, { role: "user", content: text }];
    setMessages(newMsgs);
    setInput("");
    setLoading(true);
    try {
      const resp = await fetch(`${API_URL}/price-agent`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cota, messages: newMsgs.map(m => ({ role: m.role, content: m.content })) }),
      });
      const data = await resp.json();
      setMessages(prev => [...prev, { role: "assistant", content: data.message || "Sem resposta.", meta: data }]);
    } catch {
      setMessages(prev => [...prev, { role: "assistant", content: "⚠️ Erro ao conectar com a API." }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col">
      <div className="bg-white border-b shadow-sm px-6 py-4 flex items-center gap-4">
        <button onClick={onBack} className="text-gray-400 hover:text-gray-700 text-xl leading-none shrink-0">←</button>
        <div className="flex-1 min-w-0">
          <p className="font-semibold text-gray-800 truncate">{cota.empreendimento} — Unid. {cota.codigo}</p>
          <p className="text-xs text-gray-400">
            {cota.area}m² · {cota.tipologia}
            {cota.vista_mar && " · 🌊 Vista Mar"}
            {cota.garden && " · 🌿 Garden"}
            {" · "}Pago: {fmt(cota.valor_pago)} · Saldo: {fmt(cota.saldo_devedor)}
          </p>
        </div>
        <span className="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full shrink-0 hidden sm:inline">
          🤖 Farol Pricing
        </span>
      </div>

      <div className="flex-1 overflow-y-auto px-4 py-6">
        <div className="max-w-3xl mx-auto space-y-5">
          {messages.length === 0 && (
            <div className="text-center py-16">
              <div className="text-5xl mb-4">🏖️</div>
              <p className="text-lg font-semibold text-gray-700">Olá! Sou o Farol Pricing.</p>
              <p className="text-sm text-gray-400 mt-2 max-w-sm mx-auto">
                Analiso indicadores econômicos, comparo unidades e calculo cenários de preço em tempo real.
              </p>
              <div className="mt-6 flex flex-wrap gap-2 justify-center">
                {["Qual o melhor preço para vender agora?", "Mostre a análise completa", "Compare com o rendimento da Selic"].map(s => (
                  <button key={s} onClick={() => send(s)}
                    className="bg-white border border-gray-200 text-gray-600 text-sm px-4 py-2 rounded-full hover:border-blue-400 hover:text-blue-700 transition shadow-sm">
                    {s}
                  </button>
                ))}
              </div>
            </div>
          )}

          {messages.map((m, i) => (
            <div key={i} className={m.role === "user" ? "flex justify-end" : ""}>
              {m.role === "user" ? (
                <div className="bg-blue-700 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-md text-sm shadow-sm">
                  {m.content}
                </div>
              ) : (
                <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm p-5 shadow-sm">
                  <ToolCallsTrace tools={m.meta?.tool_calls_made} />
                  <div className="prose text-gray-800 text-sm"
                    dangerouslySetInnerHTML={{ __html: marked.parse(m.content || "") }} />
                  <ScenariosCard calculos={m.meta?.calculos} />
                  <ComparablesTable comparaveis={m.meta?.comparaveis} />
                  {m.meta?.indicadores && (
                    <div className="mt-3 flex flex-wrap gap-4 text-xs text-gray-400 border-t pt-3">
                      <span>📊 Selic: <strong className="text-gray-600">{m.meta.indicadores.selic_aa}% a.a.</strong></span>
                      {m.meta.indicadores.ipca_12m != null && (
                        <span>📈 IPCA 12m: <strong className="text-gray-600">{fmtPct(m.meta.indicadores.ipca_12m)}</strong></span>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}

          {loading && (
            <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm p-5 shadow-sm">
              <div className="flex items-center gap-3 text-gray-400 text-sm">
                <svg className="animate-spin h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                </svg>
                Consultando BCB, Metabase e calculando cenários...
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>
      </div>

      <div className="bg-white border-t px-4 py-4 shadow-sm">
        <div className="max-w-3xl mx-auto flex gap-3">
          <input type="text" value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && !e.shiftKey && send(input)}
            placeholder="Pergunte sobre o preço da sua cota..."
            disabled={loading}
            className="flex-1 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 bg-gray-50" />
          <button onClick={() => send(input)} disabled={loading || !input.trim()}
            className="bg-blue-700 hover:bg-blue-800 text-white px-5 py-3 rounded-xl font-semibold text-sm transition disabled:opacity-40">
            Enviar
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [ready, setReady]           = useState(false);
  const [configErr, setConfigErr]   = useState(false);
  const [session, setSession]       = useState(null);
  const [selectedCota, setSelectedCota] = useState(null);

  useEffect(() => {
    fetch(`${API_URL}/config`)
      .then(r => r.json())
      .then(cfg => {
        sb = createClient(cfg.supabase_url, cfg.supabase_service_key);
        setReady(true);
      })
      .catch(() => setConfigErr(true));
  }, []);

  if (configErr) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50">
      <div className="text-center">
        <div className="text-5xl mb-4">⚠️</div>
        <p className="font-semibold text-gray-700">API não encontrada</p>
        <p className="text-sm text-gray-400 mt-2">Backend deve estar em <code className="bg-gray-100 px-1 rounded">{API_URL}</code></p>
      </div>
    </div>
  );

  if (!ready) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50">
      <p className="text-gray-400 text-sm animate-pulse">Conectando...</p>
    </div>
  );

  if (!selectedCota)  return <Dashboard onSelect={setSelectedCota} />;
  return <PricingChat cota={selectedCota} onBack={() => setSelectedCota(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
